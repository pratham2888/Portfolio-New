<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0d1a"/>
      <stop offset="100%" stop-color="#1a2340"/>
    </linearGradient>
    <linearGradient id="buildingL" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2f45"/>
      <stop offset="100%" stop-color="#1c2035"/>
    </linearGradient>
    <linearGradient id="buildingR" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#242840"/>
      <stop offset="100%" stop-color="#161a2e"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e2440"/>
      <stop offset="100%" stop-color="#0d1020"/>
    </linearGradient>
    <linearGradient id="glowAmber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5a623" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#e8890a" stop-opacity="0.7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Stars pattern -->
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fffbe6" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#f5a623" stop-opacity="0"/>
    </radialGradient>
  </defs>

